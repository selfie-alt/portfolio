<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nome Cognome — Creative Artist</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="desktop">

<header>
    <div class="logo">NOME COGNOME</div>
    <div class="status">Creative Studio</div>
</header>


<div class="icons">

<button onclick="openWindow('visual')">
📁<span>Visual</span>
</button>

<button onclick="openWindow('music')">
🎵<span>Music</span>
</button>

<button onclick="openWindow('about')">
👤<span>About</span>
</button>

<button onclick="openWindow('contact')">
✉️<span>Contact</span>
</button>

</div>


<!-- VISUAL WINDOW -->

<div class="window" id="visual">

<div class="bar">
Visual Archive
<button onclick="closeWindow('visual')">×</button>
</div>

<div class="content">

<h2>Photography & Design</h2>

<div class="gallery">

<img src="images/photo1.jpg">
<img src="images/photo2.jpg">
<img src="images/photo3.jpg">

</div>

</div>

</div>


<!-- MUSIC WINDOW -->

<div class="window" id="music">

<div class="bar">
Music Lab
<button onclick="closeWindow('music')">×</button>
</div>

<div class="content">

<h2>DJ / Beatmaking</h2>

<p>
Electronic music, beats and sound experiments.
</p>

<br>

<a href="#" class="link">
Listen
</a>

</div>

</div>


<!-- ABOUT WINDOW -->

<div class="window" id="about">

<div class="bar">
About Me
<button onclick="closeWindow('about')">×</button>
</div>

<div class="content">

<h2>Creative Artist</h2>

<p>
I explore the connection between images,
design and sound.
</p>

</div>

</div>


<!-- CONTACT WINDOW -->

<div class="window" id="contact">

<div class="bar">
Contact
<button onclick="closeWindow('contact')">×</button>
</div>

<div class="content">

<h2>Let's collaborate</h2>

<p>
email@email.com
</p>

</div>

</div>


</div>


<script src="script.js"></script>

</body>
</html>
