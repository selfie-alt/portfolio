<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6FD0FF"/>
      <stop offset="45%" stop-color="#2E9BFF"/>
      <stop offset="100%" stop-color="#0A5FE0"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3F5F8"/>
      <stop offset="100%" stop-color="#DEE2E8"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6F7F9"/>
    </linearGradient>
  </defs>

  <!-- squircle app tile, angoli molto smussati stile macOS, nessun bordo -->
  <rect x="0" y="0" width="512" height="512" rx="114" ry="114" fill="url(#bg)"/>

  <!-- corpo busta -->
  <rect x="126" y="180" width="260" height="164" rx="18" ry="18" fill="url(#body)"/>

  <!-- risvolto anteriore (flap) a V, angoli superiori arrotondati come il corpo -->
  <path d="M142 180
           H370
           A16 16 0 0 1 386 196
           L256 276
           L126 196
           A16 16 0 0 1 142 180
           Z" fill="url(#flap)"/>

  <!-- piega sottile del risvolto, solo ombreggiatura morbida, nessun contorno rigido -->
  <path d="M126 196 L256 276 L386 196" fill="none" stroke="#C4C9D2" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.55"/>
</svg>
